name: dns-healthcheck
description: "Run dns-healthcheck against a domain and surface findings (text, JSON, SARIF, JUnit)."
author: dns-healthcheck contributors
branding:
  icon: shield
  color: blue

inputs:
  domain:
    description: "Domain to audit (e.g. example.com)."
    required: true
  profile:
    description: "Run profile (default, strict, minimal, email, web, ci)."
    required: false
    default: ci
  output:
    description: "Output format: text, json, sarif, junit, markdown."
    required: false
    default: sarif
  fail-on:
    description: "Severity threshold that fails the job (info/notice/warning/error/critical)."
    required: false
    default: error
  upload-sarif:
    description: "If 'true' and output is sarif, upload to GitHub Code Scanning."
    required: false
    default: "true"
  python-version:
    description: "Python version to install."
    required: false
    default: "3.12"
  output-file:
    description: "Path to write the report to."
    required: false
    default: dns-healthcheck-report.sarif

outputs:
  report-path:
    description: "Path to the produced report file."
    value: ${{ steps.run.outputs.report-path }}
  severity:
    description: "Highest severity surfaced by the run."
    value: ${{ steps.run.outputs.severity }}

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install dns-healthcheck from action source
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
      run: |
        python -m pip install --upgrade pip
        pip install "$ACTION_PATH/.."

    - name: Run dns-healthcheck
      id: run
      shell: bash
      env:
        DOMAIN: ${{ inputs.domain }}
        PROFILE: ${{ inputs.profile }}
        OUTPUT: ${{ inputs.output }}
        FAIL_ON: ${{ inputs.fail-on }}
        OUTFILE: ${{ inputs.output-file }}
      run: |
        set +e
        dnshc check "$DOMAIN" \
          --profile "$PROFILE" \
          --output "$OUTPUT" \
          --fail-on "$FAIL_ON" \
          > "$OUTFILE"
        echo "exit=$?" >> "$GITHUB_OUTPUT"
        echo "report-path=$OUTFILE" >> "$GITHUB_OUTPUT"

    - name: Upload SARIF
      if: ${{ inputs.upload-sarif == 'true' && inputs.output == 'sarif' }}
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ inputs.output-file }}
        category: dns-healthcheck
